# IPTV-Auto 配置 - config/config.ini

# ==================== 核心参数 ====================
max_ipv4 = 3
max_ipv6 = 3
speed_timeout = 8000
test_bytes = 102400
enable_alias = true

# ==================== 上游公共源（公共免费源）================
# 多个源用英文逗号分隔，不要加引号
upstream_sources = https://iptv-org.github.io/iptv/countries/chn.m3u

# 你可以继续添加更多公共源，例如：
# upstream_sources = https://iptv-org.github.io/iptv/countries/chn.m3u,https://其他公共源.m3u
